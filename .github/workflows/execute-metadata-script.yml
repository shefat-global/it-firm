name: Execute Metadata Script

on:
  workflow_dispatch:

jobs:
  execute-script:
    name: Run metadata.sh on EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy metadata.sh to EC2
        run: |
          echo "Uploading metadata.sh from repository to EC2..."
          scp -i ~/.ssh/ec2_key metadata.sh \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/metadata.sh
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "chmod +x /home/${{ secrets.EC2_USER }}/metadata.sh"
          echo "metadata.sh deployed successfully"

      - name: Execute metadata.sh script
        run: |
          echo "=================================================="
          echo "     Executing metadata.sh on EC2 Instance"
          echo "=================================================="
          echo ""
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "/home/${{ secrets.EC2_USER }}/metadata.sh"
          echo ""
          echo "=================================================="
          echo "         Script Execution Complete"
          echo "=================================================="
      
      - name: Cleanup SSH Key
        if: always()
        run: |
          rm -f ~/.ssh/ec2_key
